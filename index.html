<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>The Last Signal</title>
    <!-- Inline favicon: avoids a 404 for /favicon.ico without adding a binary asset. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230b0d12'/%3E%3Ccircle cx='8' cy='8' r='3' fill='none' stroke='%238a90a0' stroke-width='1.5'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/src/styles/global.css" />
  </head>
  <body>
    <div id="app-root">
      <canvas id="game-canvas" tabindex="0" aria-label="The Last Signal game viewport"></canvas>

      <div id="loading-root" role="status" aria-live="polite">
        <div class="loading-panel">
          <h1 class="loading-title">THE LAST SIGNAL</h1>
          <p id="loading-stage" class="loading-stage">Starting…</p>
          <div class="loading-bar" aria-hidden="true">
            <div id="loading-bar-fill" class="loading-bar-fill"></div>
          </div>
        </div>
      </div>

      <div id="fatal-error-root" role="alertdialog" aria-labelledby="fatal-error-title" hidden>
        <div class="fatal-panel">
          <h1 id="fatal-error-title">Something went wrong</h1>
          <p id="fatal-error-message"></p>
          <pre id="fatal-error-details" hidden></pre>
          <div class="fatal-actions">
            <button id="fatal-reload" type="button">Reload</button>
            <button id="fatal-copy" type="button" hidden>Copy details</button>
          </div>
        </div>
      </div>

      <div id="debug-overlay-root" hidden aria-hidden="true"></div>

      <div id="ready-marker" data-testid="ready-marker" hidden>
        Milestone 0.1 — Foundation Ready
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
